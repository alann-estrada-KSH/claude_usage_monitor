name: Release

# Tag push (v1.2.3) builds Linux + Windows, publishes both to a GitHub
# Release, and republishes the apt repo (Linux) to GitHub Pages so
# `apt update && apt upgrade` picks up the new version. See
# packaging/linux/build_deb.sh and packaging/windows/installer.iss for the
# actual packaging steps this just wires together, and the README for the
# apt install line end users run once.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FLUTTER_VERSION: "3.44.4"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libsecret-1-dev \
            dpkg-dev apt-utils

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get
      - run: flutter config --enable-linux-desktop
      - run: flutter build linux --release

      - name: Build .deb
        run: packaging/linux/build_deb.sh "${{ steps.version.outputs.version }}"

      - name: Publish .deb to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-usage-monitor_${{ steps.version.outputs.version }}_amd64.deb

      - name: Assemble apt repo
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          rm -rf apt
          mkdir -p apt/pool/main apt/dists/stable/main/binary-amd64
          cp "claude-usage-monitor_${VERSION}_amd64.deb" apt/pool/main/
          cd apt
          dpkg-scanpackages pool /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9c dists/stable/main/binary-amd64/Packages > dists/stable/main/binary-amd64/Packages.gz
          # apt-ftparchive, not a hand-written heredoc: apt needs the Date and
          # the SHA256 index hashes, and warns on every `apt update` without
          # them. Written to a temp file first so the scan doesn't checksum a
          # half-written Release inside the tree it's scanning.
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Claude Usage Monitor" \
            -o APT::FTPArchive::Release::Label="Claude Usage Monitor" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Description="Unofficial Claude Usage Monitor apt repo (unsigned, [trusted=yes])" \
            release dists/stable > /tmp/Release
          mv /tmp/Release dists/stable/Release

      - name: Publish apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt
          destination_dir: apt
          keep_files: false

  build-windows:
    # Pinned, not windows-latest: flutter_inappwebview_windows (the Android
    # webview plugin's Windows stub -- unused at runtime on Windows, since
    # this app uses desktop_webview_window there, but still compiled since
    # federated plugins build for every platform they implement) uses
    # <experimental/coroutine>, which windows-latest's newer MSVC now hard
    # errors on (STL1011). windows-2022's MSVC still accepts it.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Resolve version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      - run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion=${{ steps.version.outputs.version }} packaging\windows\installer.iss

      - name: Publish installer to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageMonitorSetup.exe
